# ─────────────────────────────────────────────────────────────
# ConfigMap: airwatch-config
# Menyimpan konfigurasi aplikasi yang diinjeksikan sebagai
# environment variables ke dalam Pod (tanpa rebuild image)
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: airwatch-config
  namespace: airwatch
  labels:
    app: airwatch
data:
  # Nama dan versi aplikasi
  APP_NAME: "AirWatch"
  APP_VERSION: "1.0.0"

  # Port yang digunakan Express server
  PORT: "3000"

  # Environment
  NODE_ENV: "production"

  # Deskripsi aplikasi (untuk logging)
  APP_DESCRIPTION: "Air Quality Monitoring - SDG 11 & SDG 13"

  # ── WAQI API Configuration ──────────────────────────────────
  # URL endpoint WAQI (World Air Quality Index)
  WAQI_API_URL: "https://api.waqi.info"

  # Aktifkan mode real API (true = pakai WAQI, false = simulasi)
  # Token disimpan di Secret terpisah (airwatch-secret)
  USE_REAL_API: "true"

  # Cache TTL dalam menit (hemat API quota, default 10 menit)
  CACHE_TTL_MINUTES: "10"
